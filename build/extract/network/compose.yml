name: "unifi"
services:
  os-server:
    image: "11notes/uosserver:5.0.6"
    cap_add:
      - NET_RAW
      - NET_ADMIN
    cgroup: host
    environment:
      TZ: "Europe/Zurich"
      UOS_SYSTEM_IP: "127.0.0.1"
    volumes:
      - "/sys/fs/cgroup:/sys/fs/cgroup:rw"
      - "${HOME}/extract/network:/src"
    tmpfs:
      - "/run:exec"
      - "/run/lock"
      - "/tmp:exec"
      - "/var/lib/journal"
      - "/var/opt/unifi/tmp:size=64m"
    ports:
      - "3000:443"
    sysctls:
      net.ipv4.ip_unprivileged_port_start: 443
    restart: "always"