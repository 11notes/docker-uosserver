name: extract

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'version of uosserver image to extract'
        type: string
        required: true

jobs:
  # ╔═════════════════════════════════════════════════════╗
  # ║                                                     ║
  # ║                                                     ║
  # ║                    EXTRACT IMAGE                    ║
  # ║                                                     ║
  # ║                                                     ║
  # ╚═════════════════════════════════════════════════════╝
  extract:
    name: create container image
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        runner: [ubuntu-24.04, ubuntu-24.04-arm]
    outputs:
      IMAGE_MERGE_TAG: ${{ github.event.inputs.version }}

    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000

    permissions:
      actions: write
      contents: write
      packages: write
      attestations: write
      id-token: write
      security-events: write

    steps:
      # ╔═════════════════════════════════════════════════════╗
      # ║             CONTAINER REGISTRY LOGIN                ║
      # ╚═════════════════════════════════════════════════════╝
      # DOCKER HUB
      - name: docker / login to hub
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: docker.io
          username: 11notes
          password: ${{ secrets.DOCKER_TOKEN }}

      # GITHUB CONTAINER REGISTRY
      - name: github / login to ghcr
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ghcr.io
          username: 11notes
          password: ${{ secrets.GITHUB_TOKEN }}

      # REDHAT QUAY
      - name: quay / login to quay
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: quay.io
          username: 11notes+github
          password: ${{ secrets.QUAY_TOKEN }}

      # ╔═════════════════════════════════════════════════════╗
      # ║                 EXTRACT CONTAINER                   ║
      # ╚═════════════════════════════════════════════════════╝
      # CHECKOUT ALL DEPTHS (ALL TAGS)
      - name: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: master
          fetch-depth: 0

      # SETUP BUILDX BUILDER WITH USING LOCAL REGISTRY
      - name: setup buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
        with:
          driver-opts: network=host

      # CREATE REQUIREMENTS FOR PODMAN
      - name: requirements
        run: |
          mkdir -p ${HOME}/.config/containers
          chmod 755 ${HOME} ${HOME}/.config ${HOME}/.config/containers
          touch ${HOME}/.config/containers/storage.conf
          chmod 755 ${HOME}/.config/containers/storage.conf
          mkdir -p ${HOME}/.local/share/containers/storage/overlay
          mkdir -p ${HOME}/.local/share/containers/storage/overlay-images
          mkdir -p ${HOME}/.local/share/containers/storage/overlay-layers
          ARCH=$(arch)
          case "${ARCH}" in
            "x86_64")
              echo "DOWNLOAD_ARCH=x64" >> "${GITHUB_ENV}"
              echo "WORKFLOW_RUNNER_ARCH=amd64" >> "${GITHUB_ENV}"
            ;;
            "aarch64")
              echo "DOWNLOAD_ARCH=arm64" >> "${GITHUB_ENV}"
              echo "WORKFLOW_RUNNER_ARCH=arm64" >> "${GITHUB_ENV}"
          esac

      # DOWNLOAD UOSSERVER INSTALLER
      - name: download
        run: |
          wget -q --show-progress --progress=bar:force -O /tmp/uosserver $(curl -s "https://fw-update.ubnt.com/api/firmware?filter=eq~~product~~unifi-os-server&filter=eq~~platform~~linux-${{ env.DOWNLOAD_ARCH }}&filter=eq~~channel~~release&sort=-version" | jq -r "._embedded.firmware[] | select(.version | test(\"v${{ github.event.inputs.version }}\")) | ._links.data.href")
          chmod +x /tmp/uosserver

      # EXECUTE INSTALLER AND IGNORE FAILURE TO START
      - name: install
        run: |
          echo "y" | sudo /tmp/uosserver || echo "timeout reached, extracting container image"
          sudo cp -a /home/uosserver/.local/share/containers/storage/overlay/. ${HOME}/.local/share/containers/storage/overlay/
          sudo cp -a /home/uosserver/.local/share/containers/storage/overlay-images/. ${HOME}/.local/share/containers/storage/overlay-images/
          sudo cp -a /home/uosserver/.local/share/containers/storage/overlay-layers/. ${HOME}/.local/share/containers/storage/overlay-layers/
          sudo chown -R runner:runner ${HOME}/.local/share/containers/storage

      # EXTRACT IMAGE FROM LOCAL FILE SYSTEM
      - name: extract
        id: extract
        run: |
          IMAGE="11notes/uosserver:fw-${{ github.event.inputs.version }}-${{ env.WORKFLOW_RUNNER_ARCH }}"
          echo "DOCKER_IMAGE_NAME=${IMAGE}" >> "${GITHUB_OUTPUT}"
          echo "DOCKER_IMAGE_NAME=${IMAGE}" >> "${GITHUB_ENV}"
          podman push --tls-verify=false $(podman images uosserver --noheading | awk '{print $3}') localhost:5000/uosserver

      # BUILD IMAGE BASED ON EXTRACTED IMAGE AND PUSH TO REGISTRIES
      - name: push
        id: image-push
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          file: firmware.dockerfile
          push: true
          sbom: true
          no-cache: true
          provenance: mode=max
          platforms: linux/${{ env.WORKFLOW_RUNNER_ARCH }}
          tags: |
            11notes/uosserver:fw-${{ github.event.inputs.version }}-${{ env.WORKFLOW_RUNNER_ARCH }}
            ghcr.io/11notes/docker-uosserver:fw-${{ github.event.inputs.version }}-${{ env.WORKFLOW_RUNNER_ARCH }}
            quay.io/11notes/uosserver:fw-${{ github.event.inputs.version }}-${{ env.WORKFLOW_RUNNER_ARCH }}

      # CREATE ATTESTATION ARTIFACTS
      - name: attestation
        if: steps.image-push.outcome == 'success'
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: docker.io/11notes/uosserver
          subject-digest: ${{ steps.image-push.outputs.digest }}
          push-to-registry: false

      # EXPORT DIGEST
      - name: digest
        if: steps.image-push.outcome == 'success'
        run: |
          mkdir -p ${{ runner.temp }}/digests
          digest="${{ steps.image-push.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      # UPLOAD DIGEST
      - name: upload
        if: steps.image-push.outcome == 'success'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: digests-linux-${{ env.WORKFLOW_RUNNER_ARCH }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error


  # ╔═════════════════════════════════════════════════════╗
  # ║                                                     ║
  # ║                                                     ║
  # ║         MERGE IMAGES INTO SINGLE MANIFEST           ║
  # ║                                                     ║
  # ║                                                     ║
  # ╚═════════════════════════════════════════════════════╝
  merge_platform_images:
    needs: extract
    name: merge platform images to a single manifest
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        registry: [docker.io, ghcr.io, quay.io]

    env:
      IMAGE_MERGE_TAG: ${{ needs.extract.outputs.IMAGE_MERGE_TAG }}

    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write

    steps:
      # ╔═════════════════════════════════════════════════════╗
      # ║             CONTAINER REGISTRY LOGIN                ║
      # ╚═════════════════════════════════════════════════════╝
      # DOCKER HUB
      - name: docker / login to hub
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: docker.io
          username: 11notes
          password: ${{ secrets.DOCKER_TOKEN }}

      # GITHUB CONTAINER REGISTRY
      - name: github / login to ghcr
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ghcr.io
          username: 11notes
          password: ${{ secrets.GITHUB_TOKEN }}

      # REDHAT QUAY
      - name: quay / login to quay
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: quay.io
          username: 11notes+github
          password: ${{ secrets.QUAY_TOKEN }}


      # ╔═════════════════════════════════════════════════════╗
      # ║           MERGE PLATFORM IMAGES MANIFEST            ║
      # ╚═════════════════════════════════════════════════════╝
      # DOWNLOAD DIGESTS
      - name: platform merge / digest
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-*
          merge-multiple: true

      # SETUP BUILDX BUILDER
      - name: platform merge / buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      # GET META DATA
      - name: platform merge / meta
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ matrix.registry }}/11notes/uosserver
          tags: |
            fw-${{ env.IMAGE_MERGE_TAG }}

      # CREATE MANIFEST
      - name: platform merge / create manifest and push
        working-directory: ${{ runner.temp }}/digests
        run: |
          docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") $(printf 'docker.io/11notes/uosserver@sha256:%s ' *)

      # INSPECT MANIFEST
      - name: platform merge / inspect
        run: |
          docker buildx imagetools inspect ${{ matrix.registry }}/11notes/uosserver:${{ steps.meta.outputs.version }}
