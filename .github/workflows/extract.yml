name: extract

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'version of uosserver image to extract'
        type: string
        required: true

jobs:
  # ╔═════════════════════════════════════════════════════╗
  # ║                                                     ║
  # ║                                                     ║
  # ║                    EXTRACT IMAGE                    ║
  # ║                                                     ║
  # ║                                                     ║
  # ╚═════════════════════════════════════════════════════╝
  extract:
    name: create container image
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        runner: [ubuntu-24.04, ubuntu-24.04-arm]
    outputs:
      DOCKER_IMAGE_NAME: ${{ steps.extract.outputs.DOCKER_IMAGE_NAME }}
      DOCKER_IMAGE_MERGE_TAG: ${{ github.event.inputs.version }}

    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000
    steps:
      # ╔═════════════════════════════════════════════════════╗
      # ║                 EXTRACT CONTAINER                   ║
      # ╚═════════════════════════════════════════════════════╝
      # REQUIREMENTS
      - name: requirements
        run: |
          mkdir -p ${HOME}/.config/containers
          chmod 755 ${HOME} ${HOME}/.config ${HOME}/.config/containers
          touch ${HOME}/.config/containers/storage.conf
          chmod 755 ${HOME}/.config/containers/storage.conf
          mkdir -p ${HOME}/.local/share/containers/storage/overlay
          mkdir -p ${HOME}/.local/share/containers/storage/overlay-images
          mkdir -p ${HOME}/.local/share/containers/storage/overlay-layers
          ARCH=$(arch)
          case "${ARCH}" in
            "x86_64")
              echo "DOWNLOAD_ARCH=x64" >> "${GITHUB_ENV}"
              echo "WORKFLOW_RUNNER_ARCH=amd64" >> "${GITHUB_ENV}"
            ;;
            "aarch64")
              echo "DOWNLOAD_ARCH=arm64" >> "${GITHUB_ENV}"
              echo "WORKFLOW_RUNNER_ARCH=arm64" >> "${GITHUB_ENV}"
          esac

      # DOWNLOAD
      - name: download
        run: |
          wget -q --show-progress --progress=bar:force -O /tmp/uosserver $(curl -s "https://fw-update.ubnt.com/api/firmware?filter=eq~~product~~unifi-os-server&filter=eq~~platform~~linux-${{ env.DOWNLOAD_ARCH }}&filter=eq~~channel~~release&sort=-version" | jq -r "._embedded.firmware[] | select(.version | test(\"v${{ github.event.inputs.version }}\")) | ._links.data.href")
          chmod +x /tmp/uosserver

      # INSTALL
      - name: install
        run: |
          echo "y" | sudo /tmp/uosserver || echo "timeout reached, extracting container image"
          sudo cp -a /home/uosserver/.local/share/containers/storage/overlay/. ${HOME}/.local/share/containers/storage/overlay/
          sudo cp -a /home/uosserver/.local/share/containers/storage/overlay-images/. ${HOME}/.local/share/containers/storage/overlay-images/
          sudo cp -a /home/uosserver/.local/share/containers/storage/overlay-layers/. ${HOME}/.local/share/containers/storage/overlay-layers/
          sudo chown -R runner:runner ${HOME}/.local/share/containers/storage

      # EXTRACT
      - name: extract
        id: extract
        run: |
          IMAGE="11notes/uosserver:fw-${{ github.event.inputs.version }}-${{ env.WORKFLOW_RUNNER_ARCH }}"
          echo "DOCKER_IMAGE_NAME=${IMAGE}" >> "${GITHUB_OUTPUT}"
          podman push --tls-verify=false $(podman images uosserver --noheading | awk '{print $3}') localhost:5000/${IMAGE}

  # ╔═════════════════════════════════════════════════════╗
  # ║                                                     ║
  # ║                                                     ║
  # ║         MERGE IMAGES INTO SINGLE MANIFEST           ║
  # ║                                                     ║
  # ║                                                     ║
  # ╚═════════════════════════════════════════════════════╝
  merge_platform_images:
    needs: extract
    name: merge platform images to a single manifest
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        registry: [docker.io, ghcr.io, quay.io]

    env:
      DOCKER_IMAGE_NAME: ${{ needs.extract.outputs.DOCKER_IMAGE_NAME }}
      DOCKER_IMAGE_MERGE_TAGS: ${{ needs.docker.outputs.DOCKER_IMAGE_MERGE_TAGS }}

    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write

    steps:
      # ╔═════════════════════════════════════════════════════╗
      # ║             CONTAINER REGISTRY LOGIN                ║
      # ╚═════════════════════════════════════════════════════╝
      # DOCKER HUB
      - name: docker / login to hub
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: docker.io
          username: 11notes
          password: ${{ secrets.DOCKER_TOKEN }}

      # GITHUB CONTAINER REGISTRY
      - name: github / login to ghcr
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ghcr.io
          username: 11notes
          password: ${{ secrets.GITHUB_TOKEN }}

      # REDHAT QUAY
      - name: quay / login to quay
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: quay.io
          username: 11notes+github
          password: ${{ secrets.QUAY_TOKEN }}


      # ╔═════════════════════════════════════════════════════╗
      # ║           MERGE PLATFORM IMAGES MANIFEST            ║
      # ╚═════════════════════════════════════════════════════╝
      # DOWNLOAD DIGESTS
      - name: platform merge / digest
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-*
          merge-multiple: true

      # SETUP BUILDX BUILDER
      - name: platform merge / buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      # GET META DATA
      - name: platform merge / meta
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ matrix.registry }}/${{ env.DOCKER_IMAGE_NAME }}
          tags: |
            ${{ env.DOCKER_IMAGE_MERGE_TAGS }}

      # CREATE MANIFEST
      - name: platform merge / create manifest and push
        working-directory: ${{ runner.temp }}/digests
        run: |
          docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") $(printf 'docker.io/${{ env.DOCKER_IMAGE_NAME }}@sha256:%s ' *)

      # INSPECT MANIFEST
      - name: platform merge / inspect
        run: |
          docker buildx imagetools inspect ${{ matrix.registry }}/${{ env.DOCKER_IMAGE_NAME }}:${{ steps.meta.outputs.version }}