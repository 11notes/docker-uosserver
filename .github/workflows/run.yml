name: run

on:
  workflow_dispatch:
    inputs:
      job:
        description: 'which job to run'
        type: string
        required: false

jobs:
  # ╔═════════════════════════════════════════════════════╗
  # ║                                                     ║
  # ║                                                     ║
  # ║            CHECK FOR AVAILABLE UPDATES              ║
  # ║                                                     ║
  # ║                                                     ║
  # ╚═════════════════════════════════════════════════════╝
  update:
    if: ${{ github.event.inputs.job == 'update' }}
    runs-on: ubuntu-latest

    permissions:
      actions: read
      contents: write

    steps:
      - name: checkout all tags
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: 'master'
          fetch-depth: 0

      - name: get latest version and last tag
        run: |
          LATEST_VERSION=$(curl -s https://download.svc.ui.com/v1/software-downloads | jq -r '.downloads[] | select(.name | test("UniFi OS Server.*"; "ig")) | [.version][0]' | head -n 1)
          LATEST_TAG=$(git describe --abbrev=0 --tags `git rev-list --tags --max-count=1` | sed 's|v||')
          echo "WORKFLOW_UPDATE_BASE64JSON=$(echo '{"version":"'${LATEST_VERSION}'", "tag":"'${LATEST_TAG}'", "unraid":false, "nobody":false}' | base64 -w 0)" >> "${GITHUB_ENV}"
          echo "LATEST_VERSION=${LATEST_VERSION}" >> "${GITHUB_ENV}"

      - name: call extract
        id: extract
        uses: benc-uk/workflow-dispatch@31e2b3319479a63f0ab15bf800eff9e913504e26 #v1.3.2
        with:
          wait-for-completion: true
          workflow: extract.yml
          token: "${{ secrets.REPOSITORY_TOKEN }}"
          inputs: '{ "version":"${{ env.LATEST_VERSION }}" }'
          sync-status: true
          wait-interval-seconds: 30

      - name: call org.update
        if: steps.extract.conclusion == 'success'
        uses: benc-uk/workflow-dispatch@31e2b3319479a63f0ab15bf800eff9e913504e26 #v1.3.2
        with:
          wait-for-completion: false
          workflow: org.update.yml
          token: "${{ secrets.REPOSITORY_TOKEN }}"
          inputs: '{ "etc":"${{ env.WORKFLOW_UPDATE_BASE64JSON }}" }'